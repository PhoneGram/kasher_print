<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e293b">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Tajawal', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <title>الكاشير - الزبائن</title>
</head>
<body class="bg-gray-100 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen transition-colors duration-300">

    <!-- Header Container -->
    <div id="header-container"></div>

    <!-- Main Content -->
    <main class="pt-20 pb-24 px-4 max-w-lg mx-auto">
        
        <div class="flex items-center justify-between mb-4">
            <h2 class="text-xl font-bold">👥 الزبائن</h2>
            <button id="add-customer-btn" class="bg-green-500 hover:bg-green-600 text-white w-12 h-12 rounded-xl text-2xl font-bold transition-colors shadow-md">
                +
            </button>
        </div>

        <!-- رسالة عدم وجود زبائن -->
        <div id="no-customers-msg" class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-8 text-center hidden">
            <p class="text-gray-500 dark:text-gray-400 text-lg">لا يوجد زبائن حتى الآن</p>
        </div>

        <!-- قائمة الزبائن -->
        <div id="customers-list" class="space-y-3"></div>

    </main>

    <!-- نافذة إضافة زبون جديد (مودال) -->
    <div id="add-customer-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-2xl w-full max-w-sm p-6">
            
            <h3 class="text-lg font-bold mb-4 text-center">➕ إضافة زبون جديد</h3>

            <form id="add-customer-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-2">اسم الزبون <span class="text-red-500">*</span></label>
                    <input type="text" id="customer-name" class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-300 dark:border-gray-600 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="أدخل اسم الزبون..." required>
                </div>

                <div class="flex gap-3">
                    <button type="button" id="cancel-add-customer" class="flex-1 bg-gray-300 dark:bg-gray-600 hover:bg-gray-400 dark:hover:bg-gray-500 text-gray-800 dark:text-gray-200 rounded-xl py-3 font-bold transition-colors">
                        إلغاء
                    </button>
                    <button type="submit" class="flex-1 bg-blue-500 hover:bg-blue-600 text-white rounded-xl py-3 font-bold transition-colors shadow-md">
                        💾 حفظ
                    </button>
                </div>
            </form>

        </div>
    </div>

    <!-- Footer Container -->
    <div id="footer-container"></div>

    <!-- Scripts -->
    <script src="storage.js"></script>
    <script src="utils.js"></script>
    <script src="components.js"></script>
    <script src="customers.js"></script>

</body>
</html>
